<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scott Elling — Builder</title>
  <meta name="description" content="Apps, tools, and infrastructure by Scott Elling." />

  <!-- iOS home-screen / app icons (v2 filenames bust iOS's icon cache) -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-v2.png" />
  <meta name="apple-mobile-web-app-title" content="Scott Elling" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32-v2.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/se-icon-192.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#000000" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0A0A0A;
      --surface: #141414;
      --border: rgba(255,255,255,0.06);
      --text: #E0E0E0;
      --text-dim: rgba(255,255,255,0.4);
      --text-faint: rgba(255,255,255,0.2);
      --purple: #BB86FC;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 60px 20px 80px;
    }

    /* Header */
    .header {
      margin-bottom: 48px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #F5F5F5;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 15px;
      color: var(--text-dim);
      line-height: 1.5;
    }

    /* Projects grid */
    .projects {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .project-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }

    .project-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .project-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .project-info {
      flex: 1;
      min-width: 0;
    }

    .project-name {
      font-size: 15px;
      font-weight: 600;
      color: #F0F0F0;
      margin-bottom: 3px;
    }

    .project-desc {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .project-arrow {
      color: var(--text-faint);
      font-size: 18px;
      flex-shrink: 0;
      transition: transform 0.2s ease, color 0.2s ease;
    }

    .project-card:hover .project-arrow {
      transform: translateX(3px);
    }

    .project-status {
      display: inline-block;
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 8px;
      vertical-align: middle;
    }

    .status-live {
      background: rgba(105,240,174,0.1);
      color: #69F0AE;
    }

    .status-beta {
      background: rgba(187,134,252,0.1);
      color: #BB86FC;
    }

    .status-coming {
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.3);
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-faint);
      font-size: 13px;
    }

    /* Footer */
    .footer {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-faint);
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-faint);
      font-size: 12px;
    }

    @media (max-width: 480px) {
      .container { padding: 40px 16px 60px; }
      .header h1 { font-size: 24px; }
      .project-card { padding: 14px 16px; gap: 12px; }
      .project-icon { width: 38px; height: 38px; font-size: 16px; }
    }

    /* Toolbar + refresh */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .toolbar-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-faint);
    }

    .refresh-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.2s ease, color 0.2s ease;
    }

    .refresh-btn:hover { color: var(--text); border-color: var(--purple); }
    .refresh-btn:disabled { opacity: 0.5; cursor: default; }

    .refresh-btn .ico { display: inline-block; font-size: 13px; line-height: 1; }
    .refresh-btn.spinning .ico { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .refresh-note {
      font-size: 11px;
      color: var(--text-faint);
      margin: 4px 0 14px;
      min-height: 14px;
    }

    .status-new {
      background: rgba(232,101,26,0.12);
      color: #E8651A;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Scott Elling</h1>
      <p>Building the infrastructure that lets one person operate like a studio.</p>
    </div>

    <div class="toolbar">
      <span class="toolbar-label">Projects</span>
      <button class="refresh-btn" id="refresh-btn" title="Scan for newly deployed projects not yet listed">
        <span class="ico">↻</span><span>Refresh</span>
      </button>
    </div>
    <div class="refresh-note" id="refresh-note"></div>

    <div class="projects" id="projects">
      <div class="loading">Loading projects...</div>
    </div>

    <div class="footer">
      <span id="project-count"></span>
    </div>
  </div>

  <script>
    (function() {
      const container = document.getElementById('projects');
      const countEl = document.getElementById('project-count');
      const refreshBtn = document.getElementById('refresh-btn');
      const noteEl = document.getElementById('refresh-note');

      const statusClass = {
        'live': 'status-live',
        'beta': 'status-beta',
        'coming': 'status-coming',
        'coming soon': 'status-coming',
        'new': 'status-new',
      };

      // the slugs currently shown, so refresh only adds what's missing
      const shownSlugs = new Set();

      function cardHTML(p) {
        const url = p.url || `https://${p.slug}.scottelling.com`;
        const status = p.status || 'live';
        const cls = statusClass[status] || 'status-live';
        const hoverColor = p.color || '#BB86FC';
        return `
          <a class="project-card" href="${url}"
             onmouseenter="this.style.borderColor='${hoverColor}30'"
             onmouseleave="this.style.borderColor=''"
          >
            <div class="project-icon" style="background:${hoverColor}15; color:${hoverColor};">
              ${p.icon || '◈'}
            </div>
            <div class="project-info">
              <div class="project-name">
                ${p.name}
                <span class="project-status ${cls}">${status}</span>
              </div>
              <div class="project-desc">${p.description || ''}</div>
            </div>
            <div class="project-arrow">→</div>
          </a>`;
      }

      function updateCount() {
        const n = container.querySelectorAll('.project-card').length;
        countEl.textContent = n + ' project' + (n !== 1 ? 's' : '') + ' live';
      }

      // initial render from the static directory
      (async function load() {
        try {
          const projects = await fetch('projects.json?v=' + Date.now()).then(r => r.json());
          const visible = projects.filter(p => p.status !== 'hidden');
          if (!visible.length) { container.innerHTML = '<div class="empty">No projects yet.</div>'; return; }
          container.innerHTML = visible.map(cardHTML).join('');
          visible.forEach(p => shownSlugs.add(p.slug));
          updateCount();
        } catch (err) {
          container.innerHTML = '<div class="empty">Could not load projects.</div>';
          console.error(err);
        }
      })();

      // Refresh: ask the server which deployed *.scottelling.com projects aren't listed yet,
      // then grab + link them onto the page.
      async function refresh() {
        refreshBtn.disabled = true;
        refreshBtn.classList.add('spinning');
        noteEl.textContent = 'Scanning deployments…';
        try {
          const data = await fetch('/api/refresh?v=' + Date.now()).then(r => r.json());
          if (data.error) { noteEl.textContent = 'Refresh unavailable: ' + data.error; return; }
          const fresh = (data.discovered || []).filter(p => !shownSlugs.has(p.slug));
          if (!fresh.length) {
            noteEl.textContent = 'Up to date — no new projects found' +
              (data.scanned ? ' (' + data.scanned + ' scanned).' : '.');
            return;
          }
          const frag = fresh.map(p => cardHTML({
            name: p.name || p.slug,
            slug: p.slug,
            url: p.url,
            description: 'Auto-detected deployment at ' + p.slug + '.scottelling.com',
            status: 'new',
            icon: '✦',
            color: '#E8651A',
          })).join('');
          container.insertAdjacentHTML('beforeend', frag);
          fresh.forEach(p => shownSlugs.add(p.slug));
          updateCount();
          noteEl.textContent = 'Added ' + fresh.length + ' new project' + (fresh.length !== 1 ? 's' : '') + '.';
        } catch (err) {
          noteEl.textContent = 'Refresh failed.';
          console.error(err);
        } finally {
          refreshBtn.disabled = false;
          refreshBtn.classList.remove('spinning');
        }
      }

      refreshBtn.addEventListener('click', refresh);
    })();
  </script>
</body>
</html>
