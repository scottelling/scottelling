<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scott Elling — Builder</title>
  <meta name="description" content="Apps, tools, and infrastructure by Scott Elling." />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0A0A0A;
      --surface: #141414;
      --border: rgba(255,255,255,0.06);
      --text: #E0E0E0;
      --text-dim: rgba(255,255,255,0.4);
      --text-faint: rgba(255,255,255,0.2);
      --purple: #BB86FC;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 60px 20px 80px;
    }

    /* Header */
    .header {
      margin-bottom: 48px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #F5F5F5;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 15px;
      color: var(--text-dim);
      line-height: 1.5;
    }

    /* Projects grid */
    .projects {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .project-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }

    .project-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .project-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .project-info {
      flex: 1;
      min-width: 0;
    }

    .project-name {
      font-size: 15px;
      font-weight: 600;
      color: #F0F0F0;
      margin-bottom: 3px;
    }

    .project-desc {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .project-arrow {
      color: var(--text-faint);
      font-size: 18px;
      flex-shrink: 0;
      transition: transform 0.2s ease, color 0.2s ease;
    }

    .project-card:hover .project-arrow {
      transform: translateX(3px);
    }

    .project-status {
      display: inline-block;
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 8px;
      vertical-align: middle;
    }

    .status-live {
      background: rgba(105,240,174,0.1);
      color: #69F0AE;
    }

    .status-beta {
      background: rgba(187,134,252,0.1);
      color: #BB86FC;
    }

    .status-coming {
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.3);
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-faint);
      font-size: 13px;
    }

    /* Footer */
    .footer {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-faint);
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-faint);
      font-size: 12px;
    }

    @media (max-width: 480px) {
      .container { padding: 40px 16px 60px; }
      .header h1 { font-size: 24px; }
      .project-card { padding: 14px 16px; gap: 12px; }
      .project-icon { width: 38px; height: 38px; font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Scott Elling</h1>
      <p>Building the infrastructure that lets one person operate like a studio.</p>
    </div>

    <div class="projects" id="projects">
      <div class="loading">Loading projects...</div>
    </div>

    <div class="footer">
      <span id="project-count"></span>
    </div>
  </div>

  <script>
    (async function() {
      const container = document.getElementById('projects');
      const countEl = document.getElementById('project-count');

      try {
        const resp = await fetch('projects.json?v=' + Date.now());
        const projects = await resp.json();

        if (!projects.length) {
          container.innerHTML = '<div class="empty">No projects yet.</div>';
          return;
        }

        const statusClass = {
          'live': 'status-live',
          'beta': 'status-beta',
          'coming': 'status-coming',
          'coming soon': 'status-coming',
        };

        container.innerHTML = projects
          .filter(p => p.status !== 'hidden')
          .map(p => {
            const url = `https://${p.slug}.scottelling.com`;
            const cls = statusClass[p.status] || 'status-live';
            const hoverColor = p.color || '#BB86FC';

            return `
              <a class="project-card" href="${url}" 
                 onmouseenter="this.style.borderColor='${hoverColor}30'"
                 onmouseleave="this.style.borderColor=''"
              >
                <div class="project-icon" style="background:${hoverColor}15; color:${hoverColor};">
                  ${p.icon || '◈'}
                </div>
                <div class="project-info">
                  <div class="project-name">
                    ${p.name}
                    <span class="project-status ${cls}">${p.status}</span>
                  </div>
                  <div class="project-desc">${p.description}</div>
                </div>
                <div class="project-arrow">→</div>
              </a>
            `;
          }).join('');

        const liveCount = projects.filter(p => p.status === 'live').length;
        countEl.textContent = liveCount + ' project' + (liveCount !== 1 ? 's' : '') + ' live';

      } catch (err) {
        container.innerHTML = '<div class="empty">Could not load projects.</div>';
        console.error(err);
      }
    })();
  </script>
</body>
</html>
